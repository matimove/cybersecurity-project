<!DOCTYPE html>

<html>

<head>
    <title>Registration</title>
</head>

<body>
    <form method="post">

        {% csrf_token %}
        <p>
            username:
            <input type="text" name="username">
        </p>
        <p>
            password:
            <input type="password" name="password">
        </p>
        <button type="submit">
            Register
        </button>
    </form>

</body>

</html>
